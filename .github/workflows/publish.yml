name: Publish VS Code Extension

on:
   workflow_dispatch:

jobs:
   publish:
      runs-on: ubuntu-latest

      steps:
         - name: Checkout code
           uses: actions/checkout@v3

         - name: Set up Node.js
           uses: actions/setup-node@v3
           with:
              node-version: 22
              cache: "npm"

         - name: Install dependencies
           run: npm install

         - name: Install vsce (Visual Studio Code Extension Manager)
           run: npm install -g @vscode/vsce

         - name: Download server win32 binaries
           run: npm run download-server win32
           env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

         - name: Download server linux binaries
           run: npm run download-server linux
           env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

         - name: Build the extension
           run: npm run client-compile

         - name: Build the extension
           run: npm run package

         - name: Upload the extension
           uses: actions/upload-artifact@v4
           with:
              name: stack-lang
              path: |
                 stack-lang*

         - name: Publish to Visual Studio Code Marketplace
           run: |
              vsce publish
           env:
              VSCE_PAT: ${{ secrets.VSCE_PAT }}

   github-release:
      runs-on: ubuntu-latest
      needs: publish
      permissions:
         contents: write
      steps:
         - name: Checkout code
           uses: actions/checkout@v3

         - name: Get version from package.json
           id: package_version
           run: |
              VERSION=$(node -p "require('./package.json').version")
              echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

         - name: Download extension artifact
           uses: actions/download-artifact@v4
           with:
              name: stack-lang
              path: .

         - name: Create GitHub Release
           uses: softprops/action-gh-release@v2
           with:
              tag_name: v${{ steps.package_version.outputs.VERSION }}
              files: stack-lang*.vsix
              generate_release_notes: false
           env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
